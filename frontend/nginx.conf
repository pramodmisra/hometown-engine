server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: route everything that's not a static asset back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Light-weight health endpoint.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
